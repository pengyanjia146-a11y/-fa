name: Build Android APK v7 AppType JSON

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build APKs
        run: gradle --no-daemon assembleDebug

      - name: Show APK signing info
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --print-certs app/build/outputs/apk/stable/debug/app-stable-debug.apk
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --print-certs app/build/outputs/apk/parallel/debug/app-parallel-debug.apk

      - name: Upload stable update APK
        uses: actions/upload-artifact@v4
        with:
          name: student-reflect-v7-stable-update-apk
          path: app/build/outputs/apk/stable/debug/*.apk

      - name: Upload side-by-side APK
        uses: actions/upload-artifact@v4
        with:
          name: student-reflect-v7-parallel-no-conflict-apk
          path: app/build/outputs/apk/parallel/debug/*.apk
