name: Build Android APK v7.2 Safe Upload

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
          fi

      - name: Show project files
        run: |
          echo "Current directory:"
          pwd
          echo "Root files:"
          ls -la
          echo "Workflow files:"
          find .github/workflows -maxdepth 1 -type f -print || true

      - name: Build debug APK
        run: |
          if [ -f ./gradlew ]; then
            ./gradlew clean assembleDebug --stacktrace
          else
            gradle clean assembleDebug --stacktrace
          fi

      - name: Find APK files
        run: |
          echo "APK files generated:"
          find app/build/outputs/apk -type f -name "*.apk" -print || true
          mkdir -p apk-output
          find app/build/outputs/apk -type f -name "*.apk" -exec cp {} apk-output/ \;
          echo "APK output folder:"
          ls -la apk-output
          count=$(find apk-output -type f -name "*.apk" | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "No APK was generated. Build may have failed before output."
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-reflect-apk-v7-2-safe
          path: apk-output/*.apk
